<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>MDN Tutorial - BREAKOUT!</title>
        <style>
            * {
                padding: 0;
                margin: 0;
            }

            canvas {
                background: #eeeeee;
                display: block;
                margin: 0 auto;
            }

            button {
                display: block;
            }
        </style>
    </head>
    <body>
        <canvas id="main_canvas" width="480" height="380"></canvas>
        <button id="runButton">Start game</button>

        <script>
            const screen = document.getElementById("main_canvas");
            const ctx = screen.getContext("2d");
            const ballRadius = 10;
            var ballColor = "#0095DD"
            
            let x = screen.width/2;
            let y = screen.height-30;

            dx = 2
            dy = 2
            
            function randomColor(){
                var hexChar = "0123456789ABCDEF";
                var out = "#"
                for (var i = 0; i < 6; i++){
                    out = out + hexChar[Math.floor(Math.random()*16)];
                }
                console.log({out})
                return out;
            }

            function drawBall(){
                /* Draws a ball of radius ballRadius at coordinate x, y */
                ctx.beginPath();
                ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
                ctx.fillStyle = ballColor;
                ctx.fill();
                ctx.closePath();
            }

            function draw(){
                ctx.clearRect(0, 0, screen.width, screen.height);
                drawBall();

                /* Collision check */
                if (x + dx > screen.width - ballRadius || x + dx < ballRadius){
                    dx = -dx;
                    ballColor = randomColor();
                }

                if (y + dy > screen.height - ballRadius || y + dy < ballRadius){
                    dy = -dy;
                    ballColor = randomColor();
                }

                x = x + dx;
                y = y + dy;
            }

            function startGame(){
                setInterval(draw, 10);
            }

            const runButton = document.getElementById("runButton");
            runButton.addEventListener("click", () => {
                startGame(); 
                runButton.disabled = true;
            })

        
        </script>
    </body>
</html>
